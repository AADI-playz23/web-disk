name: Sync User Upgrade Details
run-name: 💎 Upgrade Plan for ${{ inputs.username }} to ${{ inputs.plan }}

on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      plan:
        required: true

concurrency:
  group: absora-upgrade-${{ github.event.inputs.username }}
  cancel-in-progress: true

jobs:
  upgrade-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge Upgrade
        run: |
          echo "✅ Upgrade processed for ${{ inputs.username }} to ${{ inputs.plan }}"
          echo "Note: Plan is now strictly managed in InfinityFree MySQL Database."
          echo "This workflow is kept as a notification stub and no longer modifies users.json."
