name: Absora Engine
run-name: 🚀 Deploy Slot ${{ inputs.site_id }} for ${{ inputs.username }}

on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      password:
        required: true
      plan:
        required: true
      site_id:
        required: true

concurrency:
  group: absora-${{ github.event.inputs.username }}_${{ github.event.inputs.site_id }}
  cancel-in-progress: true

jobs:
  host-user-site:
    runs-on: ubuntu-latest
    timeout-minutes: 360 
    
    env:
      SECURE_USER: ${{ github.event.inputs.username }}
      SECURE_PASS: ${{ github.event.inputs.password }}
      SITE_ID: ${{ github.event.inputs.site_id }}
      SITE_URL: ${{ secrets.SITE_URL }}

    steps:
      - name: 1. Core Database & Plan Verification
        run: |
          git clone https://${{ secrets.STORAGE_TOKEN }}@github.com/AADI-playz23/webstore.git storage_env
          cd storage_env
          
          PLAN="${{ github.event.inputs.plan }}"
          echo "ACTIVE_PLAN=$PLAN" >> $GITHUB_ENV
          
          MAX_SLOTS=1
          if [ "$PLAN" == "developer" ]; then MAX_SLOTS=2; fi
          if [ "$PLAN" == "professional" ]; then MAX_SLOTS=5; fi
          if [ "$PLAN" == "studio" ]; then MAX_SLOTS=10; fi
          
          if [ "$SITE_ID" -gt "$MAX_SLOTS" ]; then exit 1; fi

          USER_DIR="users/$SECURE_USER/$SITE_ID"
          mkdir -p "$USER_DIR"
          if [ ! -f "$USER_DIR/index.html" ]; then
            echo "<html><body style='font-family:sans-serif;text-align:center;padding:50px;background:#030712;color:#fff;'><h1>🚀 Absora Instance $SITE_ID Live</h1></body></html>" > "$USER_DIR"/index.html
          fi

          # --- INJECT SECURE FILE MANAGER WITH STORAGE QUOTAS ---
          cat <<'EOF' > "$USER_DIR"/upload.php
          <?php
          session_start();
          $USERNAME = "%%USERNAME%%"; 
          $SITE_ID = "%%SITE_ID%%";
          $PLAN = "%%PLAN%%";
          
          // 🛡 FEATURE ENFORCEMENT: Storage Quotas
          $max_bytes = 500 * 1024 * 1024; // Starter: 500MB
          if ($PLAN === 'developer') $max_bytes = 50 * 1024 * 1024 * 1024; // 50GB
          if ($PLAN === 'professional') $max_bytes = 200 * 1024 * 1024 * 1024; // 200GB
          if ($PLAN === 'studio') $max_bytes = 1024 * 1024 * 1024 * 1024; // 1TB

          function getDirSize($dir) {
              $size = 0;
              foreach (glob(rtrim($dir, '/').'/*', GLOB_NOSORT) as $each) {
                  $size += is_file($each) ? filesize($each) : getDirSize($each);
              }
              return $size;
          }

          $CORRECT_PASSWORD = "%%PASSWORD%%"; 

          if (isset($_POST['username']) && isset($_POST['password'])) {
              if ($_POST['username'] === $USERNAME && $_POST['password'] === $CORRECT_PASSWORD) $_SESSION['logged_in'] = true;
          }
          if (isset($_GET['logout'])) { session_destroy(); header("Location: upload.php"); exit; }

          if (!isset($_SESSION['logged_in']) || $_SESSION['logged_in'] !== true) {
              echo '<!DOCTYPE html><html><body style="background:#030712;color:#fff;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;"><div style="background:#111827;padding:40px;border-radius:24px;text-align:center;"><form method="POST"><input type="text" name="username" placeholder="Username" style="width:100%;padding:14px;margin-bottom:15px;border-radius:12px;border:1px solid #1f2937;background:#030712;color:#fff;" required><input type="password" name="password" placeholder="Password" style="width:100%;padding:14px;margin-bottom:15px;border-radius:12px;border:1px solid #1f2937;background:#030712;color:#fff;" required><button type="submit" style="width:100%;padding:14px;background:#3b82f6;color:#fff;border:none;border-radius:12px;font-weight:bold;cursor:pointer;">Unlock Instance</button></form></div></body></html>';
              exit;
          }
          
          if (isset($_FILES['file'])) { 
              $current_size = getDirSize('.');
              $fname = basename($_FILES['file']['name']);
              $ext = strtolower(pathinfo($fname, PATHINFO_EXTENSION));
              $blocked = ['php', 'sh', 'py', 'cgi', 'htaccess'];
              
              if(in_array($ext, $blocked)) { 
                  $upload_error = "Security Block: Executables prohibited."; 
              } else if ($current_size + $_FILES['file']['size'] > $max_bytes) {
                  $upload_error = "STORAGE LIMIT EXCEEDED: Your $PLAN plan is out of space.";
              } else { 
                  move_uploaded_file($_FILES['file']['tmp_name'], $fname); 
                  header("Location: upload.php"); exit; 
              }
          }
          
          if (isset($_GET['delete'])) { $file = basename($_GET['delete']); if($file != '.' && $file != '..' && file_exists($file)) { is_dir($file) ? rmdir($file) : unlink($file); } header("Location: upload.php"); exit; }
          function formatSize($bytes) { if ($bytes == 0) return '-'; if ($bytes >= 1048576) return number_format($bytes/1048576, 2).' MB'; return number_format($bytes/1024, 2).' KB'; }
          $files = array_diff(scandir('.'), array('.', '..', 'upload.php'));
          ?>
          <!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Absora Manager</title>
          <style>body{margin:0;font-family:sans-serif;background:#030712;color:#fff;} .btn{padding:10px 20px;background:#3b82f6;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:600;} .err-box{background:rgba(239,68,68,0.1);border:1px solid #ef4444;color:#ef4444;padding:15px;border-radius:12px;margin-bottom:20px;}</style></head><body>
          <div style="padding:30px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;">
                  <h2>/public_html</h2>
                  <form method="POST" enctype="multipart/form-data" id="uf"><input type="file" name="file" id="fi" style="display:none;" onchange="document.getElementById('uf').submit()"></form>
                  <button class="btn" onclick="document.getElementById('fi').click()">Upload File</button>
              </div>
              <?php if(isset($upload_error)) echo "<div class='err-box'>$upload_error</div>"; ?>
              <table style="width:100%;text-align:left;border-collapse:collapse;">
              <?php foreach($files as $file) {
                  $sz=formatSize(filesize($file));
                  echo "<tr><td style='padding:15px;border-bottom:1px solid #1f2937;'><a href='$file' target='_blank' style='color:#fff;text-decoration:none;'>$file</a></td><td style='padding:15px;border-bottom:1px solid #1f2937;'>$sz</td><td style='text-align:right;padding:15px;border-bottom:1px solid #1f2937;'><a href='?delete=".urlencode($file)."' style='color:#9ca3af;text-decoration:none;'>Delete</a></td></tr>";
              } ?>
              </table>
          </div></body></html>
          EOF
          
          sed -i "s/%%USERNAME%%/$SECURE_USER/g" "$USER_DIR"/upload.php
          sed -i "s/%%SITE_ID%%/$SITE_ID/g" "$USER_DIR"/upload.php
          sed -i "s/%%PLAN%%/$PLAN/g" "$USER_DIR"/upload.php
          sed -i "s/%%PASSWORD%%/$SECURE_PASS/g" "$USER_DIR"/upload.php
          
          git config user.name "System"
          git config user.email "sys@absora.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Updated Slot $SITE_ID for $SECURE_USER ($PLAN tier)"
          for i in {1..5}; do git pull --rebase origin main || git rebase --abort; git push origin main && break || sleep 4; done

      - name: 2. Network Routing
        run: |
          cd storage_env/users/${{ env.SECURE_USER }}/${{ env.SITE_ID }}
          php -S 0.0.0.0:8080 > ../../../access.log 2>&1 &
          
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb > /dev/null 2>&1
          
          # 🛡 FEATURE ENFORCEMENT: Custom Domain Linking (Studio)
          if [ "${{ env.ACTIVE_PLAN }}" == "studio" ] && [ -f "cf_token.txt" ]; then
            CF_TOKEN=$(cat cf_token.txt)
            echo "💎 Studio Plan: Linking Dedicated Custom Domain..."
            cloudflared tunnel run --token $CF_TOKEN > tunnel.log 2>&1 &
            URL="https://custom-domain-active"
          else
            cloudflared tunnel --url http://localhost:8080 > tunnel.log 2>&1 &
            MAX_RETRIES=15; COUNT=0; URL=""
            while [ -z "$URL" ] && [ $COUNT -lt $MAX_RETRIES ]; do
              sleep 2; URL=$(grep -o 'https://.*\.trycloudflare.com' tunnel.log | head -n 1); COUNT=$((COUNT+1))
            done
          fi
          
          if [ -z "$URL" ]; then exit 1; fi
          
          cd ../../../
          mkdir -p sessions
          mkdir -p status
          echo "$URL" > "sessions/${{ env.SECURE_USER }}_${{ env.SITE_ID }}.txt"
          
          git add sessions/
          git diff-index --quiet HEAD || git commit -m "Routing live for Slot ${{ env.SITE_ID }}"
          for i in {1..5}; do git pull --rebase origin main || git rebase --abort; git push origin main && break || sleep 4; done

          # ✅ Write status to git repo (no callback.php needed)
          echo "{\"status\":\"live\",\"url\":\"${URL}\"}" > "status/${{ env.SECURE_USER }}_${{ env.SITE_ID }}.json"
          git add status/
          git diff-index --quiet HEAD || git commit -m "Status: live for ${{ env.SECURE_USER }} slot ${{ env.SITE_ID }}"
          for i in {1..5}; do git pull --rebase origin main || git rebase --abort; git push origin main && break || sleep 4; done
      - name: 3. Smart Keep-Alive & 24/7 Uptime
        run: |
          if [ "${{ env.ACTIVE_PLAN }}" == "starter" ]; then
            echo "⏱️ Starter Plan Detected. Enforcing 6-hour ephemeral limit."
            sleep 21300 
            cd storage_env
            rm -f "sessions/${{ env.SECURE_USER }}_${{ env.SITE_ID }}.txt"
            
            git config user.name "System"
            git config user.email "sys@absora.com"
            git add sessions/
            git diff-index --quiet HEAD || git commit -m "Auto-Shutdown Slot ${{ env.SITE_ID }}"
            for i in {1..5}; do git pull --rebase origin main || git rebase --abort; git push origin main && break || sleep 4; done

            # ✅ Write offline status to git repo
            echo "{\"status\":\"offline\",\"url\":\"\"}" > "status/${{ env.SECURE_USER }}_${{ env.SITE_ID }}.json"
            git add status/
            git diff-index --quiet HEAD || git commit -m "Status: offline for ${{ env.SECURE_USER }} slot ${{ env.SITE_ID }}"
            for i in {1..5}; do git pull --rebase origin main || git rebase --abort; git push origin main && break || sleep 4; done
            
          elif [ "${{ env.ACTIVE_PLAN }}" == "developer" ] || [ "${{ env.ACTIVE_PLAN }}" == "professional" ] || [ "${{ env.ACTIVE_PLAN }}" == "studio" ]; then
            echo "🚀 ${{ env.ACTIVE_PLAN }} Plan. Engaging 24/7 Auto-Restarter."
            # Sleep for 5 hours and 50 minutes then relay
            sleep 21000
            
            echo "🔔 6-Hour limit approaching. Spawning relay to maintain 24/7 uptime..."
            curl -X POST \
              -H "Authorization: token ${{ secrets.STORAGE_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/AADI-playz23/web-disk/actions/workflows/server.yml/dispatches \
              -d "{\"ref\":\"main\",\"inputs\":{\"username\":\"${{ env.SECURE_USER }}\",\"password\":\"${{ env.SECURE_PASS }}\",\"site_id\":\"${{ env.SITE_ID }}\",\"plan\":\"${{ env.ACTIVE_PLAN }}\"}}"
              
            echo "Relay Spawned. Safe shutdown of current node."
          else
            echo "⏱️ Plan ${{ env.ACTIVE_PLAN }} does not include 24/7 uptime. Shutting down after 6 hours."
            sleep 21300
            cd storage_env
            rm -f "sessions/${{ env.SECURE_USER }}_${{ env.SITE_ID }}.txt"
            git config user.name "System"
            git config user.email "sys@absora.com"
            git add sessions/
            git diff-index --quiet HEAD || git commit -m "Auto-Shutdown Slot ${{ env.SITE_ID }}"
            for i in {1..5}; do git pull --rebase origin main || git rebase --abort; git push origin main && break || sleep 4; done
            # ✅ Write offline status to git repo
            echo "{\"status\":\"offline\",\"url\":\"\"}" > "status/${{ env.SECURE_USER }}_${{ env.SITE_ID }}.json"
            git add status/
            git diff-index --quiet HEAD || git commit -m "Status: offline for ${{ env.SECURE_USER }} slot ${{ env.SITE_ID }}"
            for i in {1..5}; do git pull --rebase origin main || git rebase --abort; git push origin main && break || sleep 4; done
          fi
