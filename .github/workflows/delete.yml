name: BugHost Delete Engine
run-name: 💀 Kill Slot ${{ inputs.site_id }} for ${{ inputs.username }}

on:
  workflow_dispatch:
    inputs:
      username:
        required: true
      site_id:
        required: true

concurrency:
  group: bughost-${{ github.event.inputs.username }}_${{ github.event.inputs.site_id }}
  cancel-in-progress: true 

jobs:
  kill-runner:
    runs-on: ubuntu-latest
    env:
      SECURE_USER: ${{ github.event.inputs.username }}
      SITE_ID: ${{ github.event.inputs.site_id }}
    steps:
      - name: Stop Tunnel & Clean Session
        run: |
          git clone https://${{ secrets.STORAGE_TOKEN }}@github.com/AADI-playz23/webstore.git storage_env
          cd storage_env
          
          # 🚀 FIX: We ONLY remove the session link. We do NOT touch the users/ folder.
          rm -f "sessions/${SECURE_USER}_${SITE_ID}.txt"
          
          git config user.name "System"
          git config user.email "sys@bughost.com"
          git add sessions/
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Killed Slot $SITE_ID (Files Preserved)"
            for i in {1..5}; do
              git pull --rebase origin main || git rebase --abort
              git push origin main && break || sleep 4
            done
          fi
